name: generate animation

on:
  # Executa automaticamente todo dia à meia-noite (UTC)
  schedule:
    - cron: "0 0 * * *" 
  
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:
  
  # Executa a cada push na branch main (mude para master se sua branch não se chamar main)
  push:
    branches:
    - main

# Resolve o aviso de depreciação forçando o uso do Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a cobrinha a partir do gráfico de contribuições
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Faz o push do conteúdo para a branch "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
